  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
    body { background: #F6F6F6; font-family: 'Montserrat', Arial, sans-serif; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #F6F6F6;
      font-family: 'Montserrat', Arial, sans-serif;
      color: #333;
      z-index: 9999;
    }
    #loading .mark {
      width: 48px; height: 48px;
      background: #C1121F;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 70%, 0 100%);
      margin-bottom: 18px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    #loading .text { font-weight: 700; letter-spacing: 0.1em; font-size: 14px; color: #333; }
    #loading .sub { font-size: 12px; color: #888; margin-top: 6px; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.92); }
    }
  </style>
