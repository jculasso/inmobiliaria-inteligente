name: Keep API awake

# Parche mientras la API vive en el free tier de Render (se duerme tras ~15 min
# de inactividad y el primer request después tarda 30-60s+). Pinguea /health
# seguido para que no llegue a dormirse.
#
# Cada 5 min (antes 10): los cron de GitHub Actions NO son puntuales — bajo
# carga se atrasan y a veces saltan corridas, así que con 10 min la ventana
# real entre pings podía superar los 15 min y Render se dormía igual (síntoma:
# "se pone lento por momentos" al navegar). A 5 min hay más margen. Para algo
# realmente confiable conviene un uptime monitor externo (ver notas del proyecto).
# No reemplaza la migración de infraestructura ya decidida (Lightsail).
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      # --max-time generoso: el primer ping tras dormirse puede tardar bastante
      # más que un "cold start" típico (confirmado: un intento con 30s cortó
      # sin ninguna respuesta). --retry reintenta si Render todavía está a
      # mitad de arrancar y rechaza la conexión en el primer intento.
      - name: Ping /health
        run: curl -fsS --max-time 120 --retry 2 --retry-delay 10 https://inmobiliaria-inteligente.onrender.com/health
