name: Keep API awake

# Parche mientras la API vive en el free tier de Render (se duerme por
# inactividad y el primer request después tarda 30-60s+). Pinguea /health
# cada 10 minutos para que no llegue a dormirse. No reemplaza la migración
# de infraestructura ya decidida (Lightsail) — es solo un paliativo.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      # --max-time generoso: el primer ping tras dormirse puede tardar bastante
      # más que un "cold start" típico (confirmado: un intento con 30s cortó
      # sin ninguna respuesta). --retry reintenta si Render todavía está a
      # mitad de arrancar y rechaza la conexión en el primer intento.
      - name: Ping /health
        run: curl -fsS --max-time 120 --retry 2 --retry-delay 10 https://inmobiliaria-inteligente.onrender.com/health
